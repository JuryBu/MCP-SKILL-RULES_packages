enabled = true

[mcp_servers.web-fetcher]
url = "http://127.0.0.1:14588/web-fetcher/mcp"
enabled = true

[mcp_servers.sandbox]
url = "http://127.0.0.1:14588/sandbox/mcp"
enabled = true

[mcp_servers.playwright]
url = "http://127.0.0.1:14588/playwright/mcp"
enabled = true

[mcp_servers.sequential-thinking]
url = "http://127.0.0.1:14588/sequential-thinking/mcp"
enabled = true

